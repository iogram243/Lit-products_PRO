<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Авторизация Яндекс...</title>
  </head>
  <body>
    <script src="https://yastatic.net/s3/passport-sdk/autofill/v1/sdk-suggest-with-polyfills-latest.js"></script>
    <script>
      // Если это окно было открыто как popup, SDK Яндекса само 
      // отправит postMessage в родительское окно. 
      // Но мы добавим страховку для закрытия окна.
      window.onload = function() {
        if (window.opener) {
          // Даем SDK секунду на обработку
          setTimeout(() => {
            // Если окно все еще открыто, значит что-то пошло не так
            // Но обычно SDK само закрывает его или обрабатывает.
          }, 1000);
        }
      };
    </script>
  </body>
</html>
