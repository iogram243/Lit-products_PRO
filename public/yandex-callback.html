<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Авторизация Яндекс...</title>
  </head>
  <body>
    <script src="https://yastatic.net/s3/passport-sdk/autofill/v1/sdk-suggest-with-polyfills-latest.js"></script>
    <script>
      (function() {
        // 1. Пытаемся достать access_token из hash (после #) или search (после ?)
        const params = new URLSearchParams(window.location.hash.substring(1) || window.location.search);
        const accessToken = params.get('access_token');

        if (accessToken && window.opener) {
          // 2. Отправляем токен в основное окно
          window.opener.postMessage({
            source: 'yandex-auth',
            access_token: accessToken
          }, window.location.origin);
          
          // 3. Закрываем это окно
          window.close();
        } else {
          // Если токена нет, возможно это просто инициализация SDK
          console.log("No token found in callback URL yet.");
        }
      })();
    </script>
  </body>
</html>
