<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Авторизация Яндекс...</title>
  </head>
  <body>
    <script>
      (async function() {
        const params = new URLSearchParams(
          window.location.hash.substring(1) || window.location.search
        );
        const accessToken = params.get("access_token");

        if (!accessToken) {
          document.body.textContent = "Токен Яндекса не найден.";
          return;
        }

        try {
          const response = await fetch("/api/auth/yandex", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ access_token: accessToken })
          });
          const payload = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(payload.error || "yandex-auth-failed");
          }

          if (window.opener && !window.opener.closed) {
            try {
              window.opener.location.replace(payload.redirectTo || "/");
              window.close();
              return;
            } catch (openerError) {
              console.error("Cannot update opener window:", openerError);
            }
          }

          window.location.replace(payload.redirectTo || "/");
        } catch (error) {
          console.error("Yandex callback auth error:", error);
          document.body.textContent = "Не удалось завершить вход через Яндекс.";
        }
      })();
    </script>
  </body>
</html>
